<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chowkabara Multiplayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Inject config from server environment variables
        const firebaseConfig = {{ firebase_config | safe }};

        if (firebaseConfig.apiKey) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            // Make auth and db globally available for main.js
            window.firebaseAuth = auth;
            window.firebaseDb = db;
            window.signInAnonymously = signInAnonymously;
            window.onAuthStateChanged = onAuthStateChanged;
            window.doc = doc;
            window.setDoc = setDoc;
            window.updateDoc = updateDoc;
            window.arrayUnion = arrayUnion;
        }
    </script>
</head>
<body>

    <!-- Landing / Waiting Page -->
    <div id="landing-page" class="landing-container">
        <div class="landing-card">
            <h1>Chowkabara 7x7</h1>
            <p>Epic Multiplayer Strategy</p>
            
            <div id="auth-status" class="auth-status">Connecting to Auth...</div>

            <div id="lobby-controls" style="display: none;">
                <input type="text" id="player-name" placeholder="Enter Your Name" class="input-field" maxlength="15">
                
                <div class="action-buttons">
                    <button id="btn-create" class="btn-primary">Create Room</button>
                    
                    <div class="join-section">
                        <input type="text" id="join-room-id" placeholder="Room Code" class="input-field room-input" maxlength="6">
                        <button id="btn-join" class="btn-secondary">Join</button>
                    </div>
                </div>
            </div>

            <!-- Waiting Room -->
            <div id="waiting-room" style="display: none;">
                <h2 class="room-code-display">Room Code: <span id="display-room-id"></span></h2>
                
                <div class="players-list">
                    <h3>Players in Room:</h3>
                    <ul id="players-ul"></ul>
                </div>

                <div class="waiting-actions">
                    <button id="btn-start" class="btn-primary" style="display: none;">Start Game</button>
                    <p id="waiting-msg">Waiting for players...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Page -->
    <div id="game-page" class="app-container" style="display: none;">
        <header>
            <h1>Chowkabara</h1>
            <p>Room: <span id="in-game-room"></span> | You are <span id="player-role" style="text-transform: uppercase;"></span></p>
        </header>
        
        <main class="game-area">
            <div class="player-panel left-panel">
                <div class="player-card" id="player-blue">
                    <h2>Player 1 (Blue)</h2>
                    <div class="tokens-home" id="home-blue"></div>
                </div>
                <div class="player-card" id="player-yellow">
                    <h2>Player 4 (Yellow)</h2>
                    <div class="tokens-home" id="home-yellow"></div>
                </div>
            </div>

            <div class="board-container">
                <div class="game-board" id="board">
                    <!-- Grid cells will be generated by JS -->
                </div>
                <div class="dice-container">
                    <button id="roll-button" class="btn-primary">Roll Dice</button>
                    <div id="dice-result" class="dice-result">--</div>
                    <div id="game-status" class="game-status">Waiting for game sync...</div>
                </div>
            </div>

            <div class="player-panel right-panel">
                <div class="player-card" id="player-red">
                    <h2>Player 2 (Red)</h2>
                    <div class="tokens-home" id="home-red"></div>
                </div>
                <div class="player-card" id="player-green">
                    <h2>Player 3 (Green)</h2>
                    <div class="tokens-home" id="home-green"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
